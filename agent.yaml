name: LangGraph Groq Summarizer Agent

version: "1.0.0"

description: >
  AI summarization agent using LangGraph and Groq.

framework: langgraph

entrypoint: main.py

runtime:
  python: "3.10"

permissions:
  network: true
  filesystem: read

input:
  type: text

output:
  type: json

activation_type: manual

authentication:
  - api_key

required_api_keys:
  - GROQ_API_KEY

risk_level: low
